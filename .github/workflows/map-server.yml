name: Map and Fix Server
'on':
  workflow_dispatch: null
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: npm ci && npm run build && cp htaccess.txt dist/.htaccess && cp 404-spa.html
        dist/404.html
    - name: CHMOD + verificar permissoes
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'H="ftp://$FTP_HOST"

        echo "=== Permissoes atuais ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" | awk ''{print $1,$5,$NF}''

        echo "--- assets/ ---"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/assets/" | awk ''{print $1,$5,$NF}''


        echo ""

        echo "=== CHMOD 755 em assets/ e 644 nos arquivos ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "SITE CHMOD 755 assets" 2>&1
        | head -3

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "SITE CHMOD 644 assets/index-DYJn2QEj.js"
        2>&1 | head -3

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "SITE CHMOD 644 assets/index-DjS088-i.css"
        2>&1 | head -3

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "SITE CHMOD 644 index.html"
        2>&1 | head -3

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "SITE CHMOD 644 .htaccess" 2>&1
        | head -3

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "SITE CHMOD 644 404.html" 2>&1
        | head -3


        echo ""

        echo "=== Permissoes apos CHMOD ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" | awk ''{print $1,$5,$NF}''

        echo "--- assets/ ---"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/assets/" | awk ''{print $1,$5,$NF}''

        '
    - name: Validar HTTP
      run: "sleep 10\necho \"=== HTTP tests ===\"\ncurl -s -o /dev/null -w \"/ index.html:\
        \ %{http_code} %{size_download}b\\n\" --max-time 20 https://studiologos.com.br/\n\
        curl -s -o /dev/null -w \"  JS:         %{http_code} %{size_download}b\\n\"\
        \ --max-time 30 https://studiologos.com.br/assets/index-DYJn2QEj.js\ncurl\
        \ -s -o /dev/null -w \"  CSS:        %{http_code} %{size_download}b\\n\" --max-time\
        \ 20 https://studiologos.com.br/assets/index-DjS088-i.css\ncurl -s -o /dev/null\
        \ -w \"  /biblioteca:%{http_code}\\n\"                   --max-time 10 https://studiologos.com.br/biblioteca\n\
        \nJS=$(curl -s -o /dev/null -w \"%{http_code}\" --max-time 30 https://studiologos.com.br/assets/index-DYJn2QEj.js)\n\
        CSS=$(curl -s -o /dev/null -w \"%{http_code}\" --max-time 20 https://studiologos.com.br/assets/index-DjS088-i.css)\n\
        if [ \"$JS\" = \"200\" ] && [ \"$CSS\" = \"200\" ]; then\n  echo \"\"\n  echo\
        \ \"✅ SITE 100% FUNCIONAL\"\n  echo \"\U0001F310 https://studiologos.com.br\"\
        \nelse\n  echo \"❌ JS=$JS CSS=$CSS\"\n  exit 1\nfi\n"
    - name: Snapshot branch deploy
      run: 'git config user.email "actions@github.com"

        git config user.name "GitHub Actions CI"

        cp -r dist /tmp/snap

        git checkout --orphan deploy-ci

        git rm -rf . 2>/dev/null || true

        cp -r /tmp/snap/. .

        git add -A

        git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ${GITHUB_SHA:0:7}" ||
        true

        git push --force origin deploy-ci:deploy || true

        echo "Branch deploy atualizado"

        '
      continue-on-error: true
