name: "Map Server"

on:
  workflow_dispatch:

jobs:
  map:
    runs-on: ubuntu-latest
    steps:
      - name: "Install tools"
        run: sudo apt-get install -y sshpass -q

      - name: "Map filesystem via SSH"
        env:
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSH_PASS" ssh -p 65002 \
            -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            u876483543@89.116.115.179 \
            "echo '=SSH_OK=' && pwd && echo '' && ls -la ~/domains/ && echo '' && ls -la ~/domains/studiologos.com.br/ && echo '' && ls -la ~/domains/studiologos.com.br/public_html/ && echo '' && cat ~/domains/studiologos.com.br/public_html/index.html | head -5" \
            2>&1 || echo "SSH_FALHOU"

      - name: "Map FTP root via listing"
        env:
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSH_PASS" ssh -p 65002 \
            -o StrictHostKeyChecking=no \
            u876483543@89.116.115.179 \
            "find / -name 'studiologos-probe.txt' 2>/dev/null | head -10" \
            2>&1 || echo "find falhou"
