name: Map and Fix Server
'on':
  workflow_dispatch: null
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: npm ci && npm run build && cp htaccess.txt dist/.htaccess && cp 404-spa.html
        dist/404.html
    - name: Listar TUDO no servidor (incluindo lixo WordPress)
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: "H=\"ftp://$FTP_HOST\"\necho \"=== RAIZ FTP (tudo) ===\"\ncurl -s --user\
        \ \"$FTP_USER:$FTP_PASS\" \"$H/\" | awk '{print $1,$5,$NF}' | sort -k3\necho\
        \ \"\"\necho \"=== assets/ ===\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"\
        $H/assets/\" | awk '{print $1,$5,$NF}'\necho \"\"\necho \"=== .htaccess ATUAL\
        \ (conteudo via FTP) ===\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/.htaccess\"\
        \necho \"\"\necho \"=== Arquivos WP (wp-config, wp-content, etc) ===\"\nfor\
        \ f in wp-config.php wp-login.php wp-blog-header.php xmlrpc.php; do\n  SZ=$(curl\
        \ -s --user \"$FTP_USER:$FTP_PASS\" \"$H/$f\" 2>/dev/null | wc -c)\n  [ \"\
        $SZ\" -gt \"0\" ] && echo \"EXISTE: $f ($SZ bytes)\"\ndone\ncurl -s --user\
        \ \"$FTP_USER:$FTP_PASS\" \"$H/wp-content/\" 2>/dev/null | head -3 && echo\
        \ \"wp-content EXISTS\" || echo \"no wp-content\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/wp-includes/\" 2>/dev/null | head -3 && echo \"wp-includes EXISTS\"\
        \ || echo \"no wp-includes\"\n"
    - name: DELETAR lixo WordPress + subir .htaccess correto
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: "H=\"ftp://$FTP_HOST\"\ndel() { curl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/\" -Q \"DELE $1\" 2>&1 | head -1; echo \"DEL: $1\"; }\nup()  { curl\
        \ -s -T \"$1\" --user \"$FTP_USER:$FTP_PASS\" --ftp-create-dirs \"$2\" &&\
        \ echo \"UP OK: $2 ($(wc -c<$1)b)\" || echo \"UP FAIL: $2\"; }\n\n# Deletar\
        \ lixo WordPress\nfor f in wp-config.php wp-login.php wp-blog-header.php wp-cron.php\
        \ wp-load.php wp-mail.php wp-settings.php wp-signup.php wp-trackback.php xmlrpc.php\
        \ wp-activate.php wp-links-opml.php wp-comments-post.php; do\n  del \"$f\"\
        \ndone\n\n# Deletar arquivos do site atual + lixo\nfor f in index.html .htaccess\
        \ 404.html index.php .ftp-deploy-sync-state.json deploy_test.txt studiologos-probe.txt;\
        \ do\n  del \"$f\"\ndone\n\n# Deletar assets (todos)\nfor f in assets/index-DYJn2QEj.js\
        \ assets/index-DjS088-i.css assets/index-UIeH9Ysg.js assets/index-mCBVk_n0.css;\
        \ do\n  del \"$f\"\ndone\ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/\" -Q\
        \ \"RMD assets\" 2>&1 | head -1\n\nsleep 3\n\n# Subir .htaccess PRIMEIRO (crítico)\n\
        up dist/.htaccess  \"$H/.htaccess\"\nsleep 1\n\n# Verificar .htaccess subido\n\
        echo \"=== .htaccess no servidor agora ===\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/.htaccess\"\n\n# Subir resto\nup dist/404.html   \"$H/404.html\"\n\
        up dist/index.html \"$H/index.html\"\n\n# Criar assets/ e subir\ncurl -s --user\
        \ \"$FTP_USER:$FTP_PASS\" \"$H/\" -Q \"MKD assets\" 2>&1 | head -1\nsleep\
        \ 1\nup dist/assets/index-DjS088-i.css \"$H/assets/index-DjS088-i.css\"\n\
        up dist/assets/index-DYJn2QEj.js  \"$H/assets/index-DYJn2QEj.js\"\n\necho\
        \ \"\"\necho \"=== SERVIDOR FINAL ===\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/\" | awk '{print $1,$5,$NF}'\necho \"--- assets/ ---\"\ncurl -s --user\
        \ \"$FTP_USER:$FTP_PASS\" \"$H/assets/\" | awk '{print $5,$NF}'\n"
    - name: Validar site 100%
      run: "sleep 20\necho \"=== HTTP Status ===\"\nIDX=$(curl -s -o /dev/null -w\
        \ \"%{http_code} %{size_download}b\" --max-time 20 https://studiologos.com.br/)\n\
        JS=$(curl -s -o /dev/null -w \"%{http_code} %{size_download}b\" --max-time\
        \ 30 https://studiologos.com.br/assets/index-DYJn2QEj.js)\nCSS=$(curl -s -o\
        \ /dev/null -w \"%{http_code} %{size_download}b\" --max-time 20 https://studiologos.com.br/assets/index-DjS088-i.css)\n\
        SPA=$(curl -s -o /dev/null -w \"%{http_code}\" --max-time 10 https://studiologos.com.br/biblioteca)\n\
        echo \"  /             $IDX\"\necho \"  JS bundle:    $JS\"\necho \"  CSS\
        \ bundle:   $CSS\"\necho \"  SPA /biblioteca: $SPA\"\n\nJS_CODE=$(echo $JS\
        \ | cut -d\" \" -f1)\nCSS_CODE=$(echo $CSS | cut -d\" \" -f1)\nif [ \"$JS_CODE\"\
        \ = \"200\" ] && [ \"$CSS_CODE\" = \"200\" ]; then\n  echo \"\"\n  echo \"\
        ✅ SITE 100% FUNCIONAL\"\n  echo \"\U0001F310 https://studiologos.com.br\"\n\
        else\n  echo \"JS=$JS_CODE CSS=$CSS_CODE - DIAGNOSTICO:\"\n  curl -sI --max-time\
        \ 10 https://studiologos.com.br/assets/index-DYJn2QEj.js | head -8\n  exit\
        \ 1\nfi\n"
    - name: Branch deploy snapshot
      run: 'git config user.email "actions@github.com"

        git config user.name "GitHub Actions CI"

        cp -r dist /tmp/snap

        git checkout --orphan deploy-ci

        git rm -rf . 2>/dev/null || true

        cp -r /tmp/snap/. .

        git add -A

        git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ${GITHUB_SHA:0:7}" ||
        true

        git push --force origin deploy-ci:deploy || true

        '
      continue-on-error: true
