name: Map and Fix Server
'on':
  workflow_dispatch: null
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: npm ci && npm run build && cp htaccess.txt dist/.htaccess && cp 404-spa.html
        dist/404.html && cp index.php dist/index.php
    - name: Mapear FTP completo - listar todos os subdiretorios
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: "echo \"=== RAIZ FTP ===\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"ftp://$FTP_HOST/\"\
        \ | sort\necho \"\"\necho \"=== Cada subdir da raiz ===\"\ncurl -s --user\
        \ \"$FTP_USER:$FTP_PASS\" \"ftp://$FTP_HOST/\" | awk '{print $NF}' | grep\
        \ -v \"^\\.\" | while read d; do\n  echo \"--- /$d ---\"\n  curl -s --user\
        \ \"$FTP_USER:$FTP_PASS\" \"ftp://$FTP_HOST/$d/\" 2>/dev/null | awk '{print\
        \ $5, $NF}' | head -10\ndone\necho \"\"\necho \"=== Buscando index.html em\
        \ todos os caminhos ===\"\nfor path in \"/\" \"/public_html/\" \"/www/\" \"\
        /html/\" \"/web/\" \"/httpdocs/\" \"/studiologos.com.br/\" \"/domains/studiologos.com.br/public_html/\"\
        ; do\n  SZ=$(curl -s --user \"$FTP_USER:$FTP_PASS\" \"ftp://$FTP_HOST${path}index.html\"\
        \ 2>/dev/null | wc -c)\n  echo \"$path index.html = $SZ bytes\"\ndone\n"
    - name: Upload em TODOS os paths possiveis simultaneamente
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: "up() { curl -s -T \"$1\" --user \"$FTP_USER:$FTP_PASS\" --ftp-create-dirs\
        \ \"$2\" && echo \"OK $2\" || echo \"FAIL $2\"; }\nfor base in \"/\" \"/public_html/\"\
        \ \"/www/\" \"/html/\" \"/web/\" \"/httpdocs/\"; do\n  B=\"ftp://$FTP_HOST${base}\"\
        \n  up dist/index.html   \"${B}index.html\"\n  up dist/index.php    \"${B}index.php\"\
        \n  up dist/.htaccess    \"${B}.htaccess\"\n  up dist/404.html     \"${B}404.html\"\
        \n  up dist/assets/index-DYJn2QEj.js  \"${B}assets/index-DYJn2QEj.js\"\n \
        \ up dist/assets/index-DjS088-i.css \"${B}assets/index-DjS088-i.css\"\ndone\n"
    - name: Validar qual path funcionou
      run: "sleep 20\nfor url in \"https://studiologos.com.br/\" \"https://studiologos.com.br/index.php\"\
        \ \"https://studiologos.com.br/index.html\"; do\n  SZ=$(curl -s -o /dev/null\
        \ -w \"%{size_download}\" --max-time 10 \"$url\")\n  C=$(curl -s --max-time\
        \ 10 \"$url\")\n  if echo \"$C\" | grep -q \"assets/index-\"; then\n    echo\
        \ \"SUCESSO em $url ($SZ bytes)\"\n  else\n    echo \"falha em $url ($SZ bytes)\"\
        \n  fi\ndone\nC=$(curl -s --max-time 20 https://studiologos.com.br/)\nif echo\
        \ \"$C\" | grep -q \"assets/index-\"; then echo \"BUILD ATIVA NA RAIZ\"; exit\
        \ 0; fi\nC=$(curl -s --max-time 20 https://studiologos.com.br/index.php)\n\
        if echo \"$C\" | grep -q \"assets/index-\"; then echo \"BUILD ATIVA VIA PHP\
        \ - ajustando htaccess\"; exit 0; fi\necho \"FALHA TOTAL\"\nexit 1\n"
