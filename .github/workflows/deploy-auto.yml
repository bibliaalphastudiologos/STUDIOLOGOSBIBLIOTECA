name: "Auto-Deploy Studio Logos"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Build"
        run: |
          npm ci
          npm run build
          cp htaccess.txt dist/.htaccess
          cp 404-spa.html dist/404.html
          echo "Build OK:"
          cat dist/index.html | grep "assets/"

      - name: "Descobrir path FTP e fazer upload"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Listar raiz FTP para descobrir estrutura real
          echo "=== Listando raiz FTP ==="
          curl -s --ftp-ssl-reqd \
            --user "$FTP_USER:$FTP_PASS" \
            "ftp://$FTP_HOST/" 2>&1 || \
          curl -s \
            --user "$FTP_USER:$FTP_PASS" \
            "ftp://$FTP_HOST/" 2>&1 || echo "ftp listing falhou"

          echo ""
          echo "=== Listando /domains/ ==="
          curl -s --user "$FTP_USER:$FTP_PASS" \
            "ftp://$FTP_HOST/domains/" 2>&1 || echo "sem /domains/"

          echo ""
          echo "=== Listando /domains/studiologos.com.br/ ==="
          curl -s --user "$FTP_USER:$FTP_PASS" \
            "ftp://$FTP_HOST/domains/studiologos.com.br/" 2>&1 || echo "sem esse path"

          echo ""
          echo "=== Listando /domains/studiologos.com.br/public_html/ ==="
          curl -s --user "$FTP_USER:$FTP_PASS" \
            "ftp://$FTP_HOST/domains/studiologos.com.br/public_html/" 2>&1 | head -20

      - name: "Upload via curl FTP direto"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          BASE="ftp://$FTP_HOST/domains/studiologos.com.br/public_html"

          upload() {
            local file="$1"
            local dest="$2"
            echo "Uploading $file -> $dest"
            curl -s -T "$file" \
              --user "$FTP_USER:$FTP_PASS" \
              "$dest" && echo "OK" || echo "FALHOU"
          }

          # Criar pasta assets se não existir
          curl -s --user "$FTP_USER:$FTP_PASS" \
            "ftp://$FTP_HOST/domains/studiologos.com.br/public_html/" \
            --ftp-create-dirs 2>&1 | head -3

          # Upload dos arquivos um a um (sobreescrevendo qualquer coisa)
          upload "dist/index.html"    "$BASE/index.html"
          upload "dist/.htaccess"     "$BASE/.htaccess"
          upload "dist/404.html"      "$BASE/404.html"

          # Criar pasta assets
          curl -s --user "$FTP_USER:$FTP_PASS" \
            --ftp-create-dirs \
            "ftp://$FTP_HOST/domains/studiologos.com.br/public_html/assets/" 2>&1 | head -2

          upload "dist/assets/index-DYJn2QEj.js"  "$BASE/assets/index-DYJn2QEj.js"
          upload "dist/assets/index-DjS088-i.css" "$BASE/assets/index-DjS088-i.css"

          echo ""
          echo "=== Listando servidor após upload ==="
          curl -s --user "$FTP_USER:$FTP_PASS" \
            "ftp://$FTP_HOST/domains/studiologos.com.br/public_html/" | head -20

      - name: "Validar"
        run: |
          sleep 10
          CONTENT=$(curl -s --max-time 20 https://studiologos.com.br/)
          echo "$CONTENT" | grep -o "<title>[^<]*</title>"
          if echo "$CONTENT" | grep -q "assets/index-"; then
            echo "SUCESSO: build compilada ativa"
          else
            echo "AINDA COM ARQUIVO ERRADO:"
            echo "$CONTENT" | head -15
            echo ""
            echo "=== Checando se existe /public_html/ alternativo ==="
            curl -s --max-time 10 https://studiologos.com.br/studiologos-probe.txt || echo "probe not found"
            exit 1
          fi

      - name: "Snapshot branch deploy"
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions CI"
          cp -r dist /tmp/snap
          git checkout --orphan deploy-ci
          git rm -rf . 2>/dev/null || true
          cp -r /tmp/snap/. .
          git add -A
          git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ${GITHUB_SHA:0:7}" || true
          git push --force origin deploy-ci:deploy || true
        continue-on-error: true
