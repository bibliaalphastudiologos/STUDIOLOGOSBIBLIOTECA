name: Deploy Studio Logos - Full Auto

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verificar arquivos gerados
        run: ls -la dist/

      - name: Deploy via Hostinger Action (tentativa 1)
        if: ${{ always() && (secrets.HOSTINGER_USERNAME != '' && secrets.HOSTINGER_PASSWORD != '') }}
        uses: hostinger/deploy-to-hostinger@v1
        with:
          hostinger-username: ${{ secrets.HOSTINGER_USERNAME }}
          hostinger-password: ${{ secrets.HOSTINGER_PASSWORD }}
          local-path: ./dist
          target-path: public_html

      - name: Deploy via SFTP (tentativa 2)
        if: always()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "dist/"
          target: "/public_html"
          strip_components: 1

      - name: Deploy via FTP (tentativa 3)
        if: always()
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist
          server-dir: /public_html
          exclude: |
            **/.git*
            **/node_modules/**
            **/*.md
          log-level: standard
