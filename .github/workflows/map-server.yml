name: "Map and Fix Server"

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install sshpass"
        run: sudo apt-get install -y sshpass -q

      - name: "SSH - mapear filesystem completo"
        env:
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSH_PASS" ssh -p 65002 \
            -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            u876483543@89.116.115.179 "
            echo '=== HOME ==='
            ls -la ~/
            echo '=== domains ==='
            ls -la ~/domains/ 2>/dev/null || echo sem domains
            echo '=== studiologos public_html ==='
            ls -la ~/domains/studiologos.com.br/public_html/ 2>/dev/null || echo sem esse path
            echo '=== index.html atual ==='
            cat ~/domains/studiologos.com.br/public_html/index.html 2>/dev/null | head -5
            echo '=== FTP probe ==='
            find ~/ -name 'studiologos-probe.txt' 2>/dev/null
            find ~/ -name '.ftp-deploy-sync-state.json' 2>/dev/null
            echo '=== wc index ==='
            wc -c ~/domains/studiologos.com.br/public_html/index.html 2>/dev/null
          " 2>&1
