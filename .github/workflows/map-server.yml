name: Map and Fix Server
'on':
  workflow_dispatch: null
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: npm ci && npm run build && cp htaccess.txt dist/.htaccess && cp 404-spa.html
        dist/404.html
    - name: Mapear wp-content e wp-includes
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'H="ftp://$FTP_HOST"

        echo "=== wp-content/ ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/wp-content/" | awk ''{print $1,$5,$NF}''

        echo ""

        echo "=== wp-content/.htaccess ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/wp-content/.htaccess" 2>/dev/null
        || echo "sem .htaccess em wp-content"

        echo ""

        echo "=== wp-includes/.htaccess ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/wp-includes/.htaccess" 2>/dev/null
        || echo "sem .htaccess em wp-includes"

        echo ""

        echo "=== .htaccess raiz ATUAL ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/.htaccess"

        '
    - name: Deletar WordPress recursivo + garantir assets
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: "H=\"ftp://$FTP_HOST\"\ndel() { curl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/\" -Q \"DELE $1\" 2>&1 | head -1; }\nrmd() { curl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/\" -Q \"RMD $1\" 2>&1 | head -1; }\nup()  { curl -s -T \"$1\" --user\
        \ \"$FTP_USER:$FTP_PASS\" --ftp-create-dirs \"$2\" && echo \"UP OK: $2 $(wc\
        \ -c<$1)b\" || echo \"FAIL: $2\"; }\n\n# Listar e deletar wp-content recursivamente\n\
        for subdir in wp-content wp-includes; do\n  echo \"--- Deletando /$subdir/\
        \ ---\"\n  # Listar nivel 1\n  curl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/$subdir/\"\
        \ | awk '{print $NF}' | grep -v \"^\\.\" | while read item; do\n    # Tentar\
        \ deletar como arquivo\n    curl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/\"\
        \ -Q \"DELE $subdir/$item\" 2>&1 | head -1\n    # Se for diretório, listar\
        \ e deletar nivel 2\n    curl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/$subdir/$item/\"\
        \ | awk '{print $NF}' | grep -v \"^\\.\" | while read sub; do\n      curl\
        \ -s --user \"$FTP_USER:$FTP_PASS\" \"$H/\" -Q \"DELE $subdir/$item/$sub\"\
        \ 2>&1 | head -1\n    done\n    curl -s --user \"$FTP_USER:$FTP_PASS\" \"\
        $H/\" -Q \"RMD $subdir/$item\" 2>&1 | head -1\n  done\n  del \"$subdir/.htaccess\"\
        \n  del \"$subdir/index.php\"\n  del \"$subdir/index.html\"\n  rmd \"$subdir\"\
        \n  echo \"Deletado: $subdir\"\ndone\n\n# Garantir .htaccess correto na raiz\n\
        del \".htaccess\"\nsleep 1\nup dist/.htaccess \"$H/.htaccess\"\n\n# Garantir\
        \ assets corretos\ndel \"assets/index-UIeH9Ysg.js\"\ndel \"assets/index-mCBVk_n0.css\"\
        \nup dist/assets/index-DjS088-i.css \"$H/assets/index-DjS088-i.css\"\nup dist/assets/index-DYJn2QEj.js\
        \  \"$H/assets/index-DYJn2QEj.js\"\n\necho \"\"\necho \"=== Estado final ===\"\
        \ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/\" | awk '{print $1,$5,$NF}'\n\
        echo \"--- assets/ ---\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/assets/\"\
        \ | awk '{print $5,$NF}'\necho \"--- .htaccess ---\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/.htaccess\"\n"
    - name: Validar site completo
      run: "sleep 20\necho \"=== HTTP tests ===\"\ncurl -s -o /dev/null -w \"/   \
        \          %{http_code} %{size_download}b\\n\" --max-time 20 https://studiologos.com.br/\n\
        curl -s -o /dev/null -w \"JS bundle:    %{http_code} %{size_download}b\\n\"\
        \ --max-time 30 https://studiologos.com.br/assets/index-DYJn2QEj.js\ncurl\
        \ -s -o /dev/null -w \"CSS bundle:   %{http_code} %{size_download}b\\n\" --max-time\
        \ 20 https://studiologos.com.br/assets/index-DjS088-i.css\ncurl -s -o /dev/null\
        \ -w \"/biblioteca:  %{http_code}\\n\"                   --max-time 10 https://studiologos.com.br/biblioteca\n\
        \nJS=$(curl -s -o /dev/null -w \"%{http_code}\" --max-time 30 https://studiologos.com.br/assets/index-DYJn2QEj.js)\n\
        CSS=$(curl -s -o /dev/null -w \"%{http_code}\" --max-time 20 https://studiologos.com.br/assets/index-DjS088-i.css)\n\
        if [ \"$JS\" = \"200\" ] && [ \"$CSS\" = \"200\" ]; then\n  echo \"\"\n  echo\
        \ \"✅ SITE 100% FUNCIONAL - WP REMOVIDO\"\n  echo \"\U0001F310 https://studiologos.com.br\"\
        \nelse\n  echo \"\"\n  echo \"JS=$JS CSS=$CSS\"\n  echo \"Headers do asset:\"\
        \n  curl -sI --max-time 10 https://studiologos.com.br/assets/index-DYJn2QEj.js\n\
        \  exit 1\nfi\n"
    - name: Branch deploy
      run: 'git config user.email "actions@github.com"

        git config user.name "GitHub Actions CI"

        cp -r dist /tmp/snap

        git checkout --orphan deploy-ci

        git rm -rf . 2>/dev/null || true

        cp -r /tmp/snap/. .

        git add -A

        git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ${GITHUB_SHA:0:7}" ||
        true

        git push --force origin deploy-ci:deploy || true

        '
      continue-on-error: true
