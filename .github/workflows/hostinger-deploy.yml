name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verificar arquivos gerados
        run: ls -la dist/

      - name: Garantir .htaccess na dist
        run: cp .htaccess dist/.htaccess && echo ".htaccess copiado para dist/"

      - name: Deploy to Hostinger
        uses: hostinger/deploy-to-hostinger@v1
        with:
          # Credenciais do Hostinger (adicionar como secrets)
          hostinger-username: ${{ secrets.HOSTINGER_USERNAME }}
          hostinger-password: ${{ secrets.HOSTINGER_PASSWORD }}
          # Configurações
          repository-url: https://github.com/bibliaalphastudiologos/STUDIOLOGOSBIBLIOTECA.git
          branch: main
          target-path: public_html
          # Caminho dos arquivos builteados
          local-path: ./dist
          # Comandos de build (opcional, já rodamos acima)
          # build-command: npm ci && npm run build
          # output-dir: dist
