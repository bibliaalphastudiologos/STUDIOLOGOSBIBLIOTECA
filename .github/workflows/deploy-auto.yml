name: Auto-Deploy Studio Logos
'on':
  push:
    branches:
    - main
  workflow_dispatch: null
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: 'npm ci && npm run build

        cp 404-spa.html dist/404.html

        # htaccess minimo - sem tocar em assets

        printf "Options -MultiViews\nErrorDocument 404 /index.html\n" > dist/.htaccess

        echo "=== .htaccess ===" && cat dist/.htaccess

        echo "=== index.html ===" && cat dist/index.html

        '
    - name: Deploy
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'H="ftp://$FTP_HOST"

        del() { curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "DELE $1" 2>&1 | head
        -1; }

        up()  { echo -n "  $2: "; curl -s -T "$1" --user "$FTP_USER:$FTP_PASS" --ftp-create-dirs
        "$2" && echo "OK $(wc -c<$1)b" || echo "FAIL"; }


        # Limpar assets antigos

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/assets/" | awk ''{print $NF}'' |
        grep "\." | while read f; do del "assets/$f"; done

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "RMD assets" 2>&1 | head -1

        for f in index.html .htaccess 404.html; do del "$f"; done

        sleep 1


        JS=$(ls dist/assets/*.js | head -1)

        CSS=$(ls dist/assets/*.css | head -1)

        echo "JS: $(basename $JS) | CSS: $(basename $CSS)"


        up dist/.htaccess  "$H/.htaccess"

        up dist/index.html "$H/index.html"

        up dist/404.html   "$H/404.html"

        up "$CSS"          "$H/assets/$(basename $CSS)"

        up "$JS"           "$H/assets/$(basename $JS)"


        echo ""

        echo "=== Servidor final ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" | awk ''{print $5,$NF}''

        echo "assets/:"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/assets/" | awk ''{print $5,$NF}''

        echo ".htaccess:"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/.htaccess"

        '
    - name: Validar
      run: "sleep 20\nJS=$(ls dist/assets/*.js | head -1 | xargs basename)\nCSS=$(ls\
        \ dist/assets/*.css | head -1 | xargs basename)\n\necho \"=== HTTP ===\"\n\
        curl -s -o /dev/null -w \"/              %{http_code} %{size_download}b\\\
        n\" --max-time 20 https://studiologos.com.br/\ncurl -s -o /dev/null -w \"\
        JS bundle:     %{http_code} %{size_download}b\\n\" --max-time 30 \"https://studiologos.com.br/assets/$JS\"\
        \ncurl -s -o /dev/null -w \"CSS bundle:    %{http_code} %{size_download}b\\\
        n\" --max-time 20 \"https://studiologos.com.br/assets/$CSS\"\ncurl -s -o /dev/null\
        \ -w \"/biblioteca:   %{http_code}\\n\"                   --max-time 10 https://studiologos.com.br/biblioteca\n\
        \nJS_SZ=$(curl -s -o /dev/null -w \"%{size_download}\" --max-time 30 \"https://studiologos.com.br/assets/$JS\"\
        )\necho \"JS size: ${JS_SZ} bytes\"\n\nif [ \"$JS_SZ\" -gt \"100000\" ]; then\n\
        \  echo \"\"\n  echo \"✅ SITE 100% NO AR E FUNCIONAL\"\n  echo \"\U0001F310\
        \ https://studiologos.com.br\"\nelse\n  echo \"❌ JS=${JS_SZ}b — .htaccess\
        \ bloqueando assets\"\n  curl -sI --max-time 10 \"https://studiologos.com.br/assets/$JS\"\
        \ | head -6\n  exit 1\nfi\n"
