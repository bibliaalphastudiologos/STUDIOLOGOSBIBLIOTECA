name: Map and Fix Server
'on':
  workflow_dispatch: null
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: npm ci && npm run build && cp htaccess.txt dist/.htaccess && cp 404-spa.html
        dist/404.html && echo OK && cat dist/index.html | grep assets
    - name: DELETE + upload cirurgico via curl FTP
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: "BASE=\"ftp://$FTP_HOST/domains/studiologos.com.br/public_html\"\n# Deletar\
        \ arquivos antigos via DELE\nfor f in index.html .htaccess 404.html assets/index-DYJn2QEj.js\
        \ assets/index-DjS088-i.css; do\n  curl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$BASE/\" -Q \"DELE $f\" 2>/dev/null || true\ndone\nsleep 3\n# Upload dos\
        \ novos arquivos\nup() { echo -n \"$2: \"; curl -s -T \"$1\" --user \"$FTP_USER:$FTP_PASS\"\
        \ --ftp-create-dirs \"$2\" && echo \"OK\" || echo \"FAIL\"; }\nup dist/index.html\
        \ \"$BASE/index.html\"\nup dist/.htaccess \"$BASE/.htaccess\"\nup dist/404.html\
        \ \"$BASE/404.html\"\nup dist/assets/index-DYJn2QEj.js \"$BASE/assets/index-DYJn2QEj.js\"\
        \nup dist/assets/index-DjS088-i.css \"$BASE/assets/index-DjS088-i.css\"\n\
        echo \"\"\necho \"=== index.html no servidor (bytes) ===\"\ncurl -s --user\
        \ \"$FTP_USER:$FTP_PASS\" \"$BASE/index.html\" | wc -c"
    - name: Validar HTTP
      run: "sleep 15\nfor i in 1 2 3 4 5; do\n  SZ=$(curl -s -o /dev/null -w \"%{size_download}\"\
        \ -H \"Cache-Control: no-cache\" --max-time 15 https://studiologos.com.br/)\n\
        \  echo \"Tentativa $i: $SZ bytes\"\n  C=$(curl -s -H \"Cache-Control: no-cache\"\
        \ --max-time 15 https://studiologos.com.br/)\n  if echo \"$C\" | grep -q \"\
        assets/index-\"; then\n    echo \"SUCESSO: BUILD COMPILADA ATIVA\"\n    exit\
        \ 0\n  fi\n  echo \"$C\" | grep \"src=\" | head -2\n  sleep 15\ndone\necho\
        \ \"FALHA\"\nexit 1"
