name: "Map and Fix Server"

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Build"
        run: |
          npm ci && npm run build
          cp htaccess.txt dist/.htaccess
          cp 404-spa.html dist/404.html

      - name: "Inspecionar /domains/ via FTP"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "=== /domains/ ==="
          curl -s --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/domains/" 2>&1

          echo "=== /domains/studiologos.com.br/ ==="
          curl -s --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/domains/studiologos.com.br/" 2>&1

          echo "=== /domains/studiologos.com.br/public_html/ ==="
          curl -s --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/domains/studiologos.com.br/public_html/" 2>&1

          echo "=== index.html dentro de /domains/ ==="
          curl -s --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/domains/studiologos.com.br/public_html/index.html" 2>&1 | wc -c

      - name: "Upload cirurgico em /domains/studiologos.com.br/public_html/"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          BASE="ftp://$FTP_HOST/domains/studiologos.com.br/public_html"
          
          up() {
            echo -n "  $2 ... "
            curl -s -T "$1" --user "$FTP_USER:$FTP_PASS" --ftp-create-dirs "$2" \
              && echo "OK" || echo "FAIL"
          }

          up dist/index.html   "$BASE/index.html"
          up dist/.htaccess    "$BASE/.htaccess"
          up dist/404.html     "$BASE/404.html"
          up dist/assets/index-DYJn2QEj.js  "$BASE/assets/index-DYJn2QEj.js"
          up dist/assets/index-DjS088-i.css "$BASE/assets/index-DjS088-i.css"

          echo ""
          echo "=== Verificar o que chegou ==="
          curl -s --user "$FTP_USER:$FTP_PASS" "$BASE/" 2>&1
          echo ""
          echo "=== Size do index.html no servidor ==="
          curl -s --user "$FTP_USER:$FTP_PASS" "$BASE/index.html" 2>&1 | wc -c

      - name: "Validar resultado"
        run: |
          sleep 10
          C=$(curl -s --max-time 20 https://studiologos.com.br/)
          SZ=$(echo "$C" | wc -c)
          echo "Size recebido: $SZ"
          echo "$C" | grep -o "<title>[^<]*</title>"
          if echo "$C" | grep -q "assets/index-"; then
            echo "SUCESSO: BUILD COMPILADA NO AR"
          else
            echo "FALHA"
            echo "$C" | head -15
            exit 1
          fi
