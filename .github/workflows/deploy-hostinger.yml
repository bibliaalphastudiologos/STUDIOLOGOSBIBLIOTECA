name: Deploy Studio Logos → Hostinger (SFTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SSH_HOST: 89.116.115.179
  SSH_PORT: 65002
  SSH_USER: u876483543
  REMOTE_DIR: /home/u876483543/domains/studiologos.com.br/public_html

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔨 Compilar projeto (build de produção)
        run: npm run build

      - name: 📄 Criar .htaccess para SPA routing
        run: |
          cat > dist/.htaccess << 'HTEOF'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [QSA,L]
          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 year"
            ExpiresByType font/woff2 "access plus 1 year"
          </IfModule>
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript
          </IfModule>
          HTEOF

      - name: 📄 Criar página 404.html
        run: |
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/">
            <title>Studio Logos</title>
          </head>
          <body>
            <script>window.location.href = '/';</script>
          </body>
          </html>
          EOF

      - name: 📋 Listar arquivos da build
        run: |
          echo "=== Arquivos na build ==="
          find dist -type f | sort
          echo "=== Tamanho total ==="
          du -sh dist/

      - name: 🔧 Instalar sshpass e rsync
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass rsync

      - name: 🚀 Deploy via SFTP/rsync para Hostinger
        env:
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          # Configurar SSH para não verificar host
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile /dev/null" >> ~/.ssh/config
          
          # Limpar o diretório remoto e fazer upload
          sshpass -p "$SSH_PASS" ssh -p $SSH_PORT $SSH_USER@$SSH_HOST \
            "rm -rf $REMOTE_DIR/* && mkdir -p $REMOTE_DIR"
          
          # Upload dos arquivos via rsync sobre SSH
          sshpass -p "$SSH_PASS" rsync -avz --delete \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            dist/ \
            $SSH_USER@$SSH_HOST:$REMOTE_DIR/
          
          echo "✅ Upload concluído!"

      - name: ✅ Verificar deploy
        env:
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          echo "=== Verificando arquivos no servidor ==="
          sshpass -p "$SSH_PASS" ssh -p $SSH_PORT \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            $SSH_USER@$SSH_HOST \
            "ls -lh $REMOTE_DIR/ && echo '✅ Deploy verificado!'"
          
          echo ""
          echo "🎉 Studio Logos deployado com sucesso!"
          echo "🌐 Acesse: https://studiologos.com.br"
