name: Auto-Deploy Studio Logos
'on':
  push:
    branches:
    - main
  workflow_dispatch: null
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: 'npm ci && npm run build

        cp htaccess.txt dist/.htaccess

        cp 404-spa.html dist/404.html

        echo "Assets gerados:"

        find dist -type f | sort

        cat dist/index.html

        '
    - name: Deploy no Hostinger
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: "H=\"ftp://$FTP_HOST\"\ndel() { curl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/\" -Q \"DELE $1\" 2>&1 | head -1; }\nup()  { echo -n \"  $2: \"; curl\
        \ -s -T \"$1\" --user \"$FTP_USER:$FTP_PASS\" --ftp-create-dirs \"$2\" &&\
        \ echo \"OK $(wc -c<$1)b\" || echo \"FAIL\"; }\n\n# Apagar todos os assets\
        \ antigos (qualquer hash)\ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/assets/\"\
        \ | awk '{print $NF}' | grep \"\\.\" | while read f; do\n  del \"assets/$f\"\
        \ndone\ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/\" -Q \"RMD assets\" 2>&1\
        \ | head -1\n\n# Apagar arquivos raiz\nfor f in index.html .htaccess 404.html\
        \ index.php .ftp-deploy-sync-state.json; do del \"$f\"; done\n\n# Subir com\
        \ nomes dinâmicos (qualquer hash)\nJS=$(ls dist/assets/*.js | head -1)\nCSS=$(ls\
        \ dist/assets/*.css | head -1)\necho \"Subindo: $(basename $JS) + $(basename\
        \ $CSS)\"\nup dist/.htaccess  \"$H/.htaccess\"\nup dist/index.html \"$H/index.html\"\
        \nup dist/404.html   \"$H/404.html\"\nup \"$CSS\"          \"$H/assets/$(basename\
        \ $CSS)\"\nup \"$JS\"           \"$H/assets/$(basename $JS)\"\n\necho \"\"\
        \necho \"Estado final:\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/\" |\
        \ awk '{print $5,$NF}'\necho \"assets/:\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/assets/\" | awk '{print $5,$NF}'\n"
    - name: Validar
      run: "sleep 20\nJS=$(ls dist/assets/*.js | head -1 | xargs basename)\nCSS=$(ls\
        \ dist/assets/*.css | head -1 | xargs basename)\nJS_OK=$(curl -s -o /dev/null\
        \ -w \"%{http_code}\" --max-time 30 \"https://studiologos.com.br/assets/$JS\"\
        )\nCSS_OK=$(curl -s -o /dev/null -w \"%{http_code}\" --max-time 20 \"https://studiologos.com.br/assets/$CSS\"\
        )\nIDX_OK=$(curl -s --max-time 20 https://studiologos.com.br/ | grep -c \"\
        assets/\")\n\ncurl -s -o /dev/null -w \"/              %{http_code} %{size_download}b\\\
        n\" --max-time 20 https://studiologos.com.br/\ncurl -s -o /dev/null -w \"\
        JS bundle:     %{http_code} %{size_download}b\\n\" --max-time 30 \"https://studiologos.com.br/assets/$JS\"\
        \ncurl -s -o /dev/null -w \"CSS bundle:    %{http_code} %{size_download}b\\\
        n\" --max-time 20 \"https://studiologos.com.br/assets/$CSS\"\ncurl -s -o /dev/null\
        \ -w \"/biblioteca:   %{http_code}\\n\" --max-time 10 https://studiologos.com.br/biblioteca\n\
        \nif [ \"$JS_OK\" = \"200\" ] && [ \"$CSS_OK\" = \"200\" ] && [ \"$IDX_OK\"\
        \ -gt \"0\" ]; then\n  echo \"\"\n  echo \"✅ SITE 100% NO AR\"\n  echo \"\U0001F310\
        \ https://studiologos.com.br\"\nelse\n  echo \"❌ JS=$JS_OK CSS=$CSS_OK IDX=$IDX_OK\"\
        \n  exit 1\nfi\n"
