<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Limpando Studio Logos Educação</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fffaf0;
        color: #0f172a;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 24px;
      }

      h1 {
        margin: 0 0 12px;
        color: #0f766e;
      }

      p {
        margin: 0;
        color: rgba(15, 23, 42, 0.75);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Studio Logos Educação</h1>
      <p>Limpando cache antigo, removendo PWA legado e abrindo a plataforma nova...</p>
    </main>

    <script>
      (async function cleanStudioLogos() {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
            try {
              const registration = await navigator.serviceWorker.register("/service-worker.js?destroy=" + Date.now(), {
                updateViaCache: "none",
              });
              await registration.update();
            } catch (error) {
              console.warn("Destroy service worker registration skipped", error);
            }
          }

          if ("caches" in window) {
            const names = await caches.keys();
            await Promise.all(names.map((name) => caches.delete(name)));
          }

          try {
            localStorage.clear();
            sessionStorage.clear();
          } catch (error) {
            console.warn("Storage clear skipped", error);
          }

          if ("indexedDB" in window && indexedDB.databases) {
            try {
              const databases = await indexedDB.databases();
              await Promise.all(databases.map((database) => database.name && indexedDB.deleteDatabase(database.name)));
            } catch (error) {
              console.warn("IndexedDB clear skipped", error);
            }
          }
        } finally {
          window.location.replace("/?clean=" + Date.now() + "&studio=educacao");
        }
      })();
    </script>
  </body>
</html>
