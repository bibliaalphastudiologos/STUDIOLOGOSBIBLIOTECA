name: Build & Deploy Studio Logos

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Build Output ==="
          ls -lh public_html/
          ls -lh public_html/assets/
          echo "Total size: $(du -sh public_html/ | cut -f1)"

      - name: Authenticate to Google Cloud
        id: auth
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}

      - name: Deploy Firestore Rules
        if: steps.auth.outcome == 'success'
        continue-on-error: true
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, subprocess
          project = "sentinela-ai-489015"
          database = "ai-studio-d00d75cd-ea9b-4bf1-9db1-7ac14eff586f"
          token = subprocess.check_output(["gcloud", "auth", "print-access-token"]).decode().strip()
          rules = open("firestore.studiologos.rules").read()
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
          payload = json.dumps({"source": {"files": [{"content": rules, "name": "firestore.rules"}]}}).encode()
          req = urllib.request.Request(
              f"https://firebaserules.googleapis.com/v1/projects/{project}/rulesets",
              data=payload, headers=headers, method="POST")
          with urllib.request.urlopen(req) as r:
              ruleset = json.load(r)
          print(f"Ruleset: {ruleset['name']}")
          PYEOF
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

      - name: Deploy Firebase Hosting
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENTINELA_AI_489015 }}
          projectId: sentinela-ai-489015
          channelId: live

      - name: Deploy summary
        run: |
          echo "=================================="
          echo "Build: SUCCESS"
          echo "public_html updated and committed"
          echo "Firebase: ${{ steps.deploy.outcome || 'skipped (secret not configured)' }}"
          echo "=================================="
