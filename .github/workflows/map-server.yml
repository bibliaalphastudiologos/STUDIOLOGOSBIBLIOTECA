name: Map and Fix Server
'on':
  workflow_dispatch: null
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: npm ci && npm run build && cp htaccess.txt dist/.htaccess && cp 404-spa.html
        dist/404.html
    - name: Listar estado atual do servidor
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'echo "=== RAIZ FTP ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/" | awk ''{print $1,$5,$NF}''

        echo "=== assets/ ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/assets/" 2>&1 | awk
        ''{print $1,$5,$NF}''

        echo "=== domains/ ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/domains/" 2>&1 | awk
        ''{print $1,$5,$NF}'' | head -20

        '
    - name: Deletar lixo e subir assets corretos
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'H="ftp://$FTP_HOST"

        del() { curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "DELE $1" 2>&1 | grep
        -v "^*" || true; echo "DEL $1"; }

        up()  { curl -s -T "$1" --user "$FTP_USER:$FTP_PASS" --ftp-create-dirs "$2"
        && echo "UP OK $2 ($(wc -c<$1)b)" || echo "FAIL $2"; }


        # Limpar assets velhos

        del "assets/index-UIeH9Ysg.js"

        del "assets/index-mCBVk_n0.css"

        del "assets/index-DYJn2QEj.js"

        del "assets/index-DjS088-i.css"


        # Limpar lixo na raiz

        del ".ftp-deploy-sync-state.json"

        del "studiologos-probe.txt"

        del "deploy_test.txt"

        del "index.php"


        # Limpar pasta domains/ (uploads errados anteriores)

        del "domains/studiologos.com.br/public_html/assets/index-DYJn2QEj.js"

        del "domains/studiologos.com.br/public_html/assets/index-DjS088-i.css"

        del "domains/studiologos.com.br/public_html/index.html"

        del "domains/studiologos.com.br/public_html/.htaccess"

        del "domains/studiologos.com.br/public_html/404.html"


        # Subir assets corretos na raiz FTP

        up dist/assets/index-DYJn2QEj.js  "$H/assets/index-DYJn2QEj.js"

        up dist/assets/index-DjS088-i.css "$H/assets/index-DjS088-i.css"


        # Reupar index/htaccess/404 também (garantia)

        up dist/index.html  "$H/index.html"

        up dist/.htaccess   "$H/.htaccess"

        up dist/404.html    "$H/404.html"


        echo ""

        echo "=== Estado final da raiz FTP ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" | awk ''{print $1,$5,$NF}''

        echo "=== assets/ ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/assets/" | awk ''{print $1,$5,$NF}''

        '
    - name: Validar site completo
      run: "sleep 15\necho \"=== index.html ===\"\nSTATUS=$(curl -s -o /dev/null -w\
        \ \"%{http_code}\" --max-time 15 https://studiologos.com.br/)\nSZ=$(curl -s\
        \ -o /dev/null -w \"%{size_download}\" --max-time 15 https://studiologos.com.br/)\n\
        echo \"HTTP $STATUS | $SZ bytes\"\n\necho \"=== assets ===\"\ncurl -s -o /dev/null\
        \ -w \"JS:  %{http_code} %{size_download}b\\n\" --max-time 15 https://studiologos.com.br/assets/index-DYJn2QEj.js\n\
        curl -s -o /dev/null -w \"CSS: %{http_code} %{size_download}b\\n\" --max-time\
        \ 15 https://studiologos.com.br/assets/index-DjS088-i.css\n\necho \"=== SPA\
        \ routing ===\"\ncurl -s -o /dev/null -w \"/biblioteca: %{http_code}\\n\"\
        \ --max-time 15 https://studiologos.com.br/biblioteca\n\nC=$(curl -s --max-time\
        \ 20 https://studiologos.com.br/)\nif echo \"$C\" | grep -q \"assets/index-\"\
        ; then\n  echo \"\"\n  echo \"✅ DEPLOY COMPLETO E VALIDADO\"\n  echo \"\U0001F310\
        \ https://studiologos.com.br\"\nelse\n  echo \"❌ index.html sem assets\"\n\
        \  echo \"$C\" | head -10\n  exit 1\nfi\n"
    - name: Snapshot branch deploy
      run: 'git config user.email "actions@github.com"

        git config user.name "GitHub Actions CI"

        cp -r dist /tmp/snap

        git checkout --orphan deploy-ci

        git rm -rf . 2>/dev/null || true

        cp -r /tmp/snap/. .

        git add -A

        git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ${GITHUB_SHA:0:7}" ||
        true

        git push --force origin deploy-ci:deploy || true

        '
      continue-on-error: true
