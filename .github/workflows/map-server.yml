name: Map and Fix Server
'on':
  workflow_dispatch: null
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: npm ci && npm run build && cp htaccess.txt dist/.htaccess && cp 404-spa.html
        dist/404.html && ls -lh dist/ && ls -lh dist/assets/
    - name: Upload assets + verificar
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: "H=\"ftp://$FTP_HOST\"\nup() { echo -n \"UP $2: \"; curl -v -T \"$1\" --user\
        \ \"$FTP_USER:$FTP_PASS\" --ftp-create-dirs \"$2\" 2>&1 | grep -E \"^[<>*]|226|550|125|150|Upload\"\
        \ | head -5; echo \"($(wc -c<$1)b)\"; }\n\necho \"=== Estado assets/ antes\
        \ ===\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/assets/\" | awk '{print\
        \ $5,$NF}'\n\n# Deletar assets velhos\ncurl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/\" -Q \"DELE assets/index-DYJn2QEj.js\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\"\
        \ \"$H/\" -Q \"DELE assets/index-DjS088-i.css\"\n\n# Upload JS (arquivo grande\
        \ - 1.3MB)\necho \"=== Subindo JS (1.3MB) ===\"\ncurl -T dist/assets/index-DYJn2QEj.js\
        \ \\\n  --user \"$FTP_USER:$FTP_PASS\" \\\n  --ftp-create-dirs \\\n  --retry\
        \ 3 --retry-delay 5 \\\n  \"$H/assets/index-DYJn2QEj.js\" && echo \"JS OK\"\
        \ || echo \"JS FAIL\"\n\n# Upload CSS\necho \"=== Subindo CSS (78KB) ===\"\
        \ncurl -T dist/assets/index-DjS088-i.css \\\n  --user \"$FTP_USER:$FTP_PASS\"\
        \ \\\n  --ftp-create-dirs \\\n  \"$H/assets/index-DjS088-i.css\" && echo \"\
        CSS OK\" || echo \"CSS FAIL\"\n\necho \"\"\necho \"=== assets/ apos upload\
        \ ===\"\ncurl -s --user \"$FTP_USER:$FTP_PASS\" \"$H/assets/\" | awk '{print\
        \ $5,$NF}'\n"
    - name: Validar assets HTTP
      run: "sleep 10\nJS=$(curl -s -o /dev/null -w \"%{http_code} %{size_download}b\"\
        \ --max-time 30 https://studiologos.com.br/assets/index-DYJn2QEj.js)\nCSS=$(curl\
        \ -s -o /dev/null -w \"%{http_code} %{size_download}b\" --max-time 30 https://studiologos.com.br/assets/index-DjS088-i.css)\n\
        echo \"JS:  $JS\"\necho \"CSS: $CSS\"\nif echo \"$JS\" | grep -q \"^200\"\
        \ && echo \"$CSS\" | grep -q \"^200\"; then\n  echo \"\"\n  echo \"✅ TODOS\
        \ OS ASSETS OK\"\n  echo \"✅ SITE COMPLETAMENTE FUNCIONAL\"\n  echo \"\U0001F310\
        \ https://studiologos.com.br\"\nelse\n  echo \"❌ Assets com problema\"\n \
        \ exit 1\nfi\n"
    - name: Snapshot branch deploy
      run: 'git config user.email "actions@github.com"

        git config user.name "GitHub Actions CI"

        cp -r dist /tmp/snap

        git checkout --orphan deploy-ci

        git rm -rf . 2>/dev/null || true

        cp -r /tmp/snap/. .

        git add -A

        git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ${GITHUB_SHA:0:7}" ||
        true

        git push --force origin deploy-ci:deploy || true

        echo "Branch deploy atualizado"

        '
      continue-on-error: true
