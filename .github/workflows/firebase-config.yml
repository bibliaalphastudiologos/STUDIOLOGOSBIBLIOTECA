name: 🔧 Configurar Firebase (Authorized Domains)

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domínios a adicionar (separados por vírgula)'
        required: false
        default: 'studiologos.com.br,www.studiologos.com.br'

jobs:
  configure-firebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Configurar domínios autorizados
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: sentinela-ai-489015
          DOMAINS: ${{ github.event.inputs.domains }}
        run: |
          echo "Domínios a configurar: $DOMAINS"
          node << 'EOF'
          const https = require('https');
          const { execSync } = require('child_process');

          const PROJECT_ID = process.env.PROJECT_ID;
          const DOMAINS = process.env.DOMAINS.split(',').map(d => d.trim());

          function httpRequest(options, body) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => resolve({ status: res.statusCode, body: JSON.parse(data) }));
              });
              req.on('error', reject);
              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          }

          async function run() {
            // Obter access token via firebase-tools
            const token = process.env.FIREBASE_TOKEN;
            const tokenRes = execSync(
              `firebase --token "${token}" projects:list --json`,
              { encoding: 'utf8' }
            );
            console.log('Firebase auth OK');

            // Ler config atual
            const getResult = execSync(
              `firebase --token "${token}" auth:export /tmp/test_auth.json --project ${PROJECT_ID} 2>&1 || true`,
              { encoding: 'utf8' }
            );

            // Usar REST API com o token
            const accessTokenResult = execSync(
              `node -e "
                const {execSync} = require('child_process');
                const tools = require('/usr/local/lib/node_modules/firebase-tools');
              " 2>&1 || true`,
              { encoding: 'utf8' }
            );

            console.log('Configurando via API...');
            // O firebase-tools expõe getAccessToken internamente
            const getToken = execSync(
              `node -e "
                const api = require('/usr/local/lib/node_modules/firebase-tools/lib/api');
                const { getAccessToken } = require('/usr/local/lib/node_modules/firebase-tools/lib/auth');
                getAccessToken(process.env.FIREBASE_TOKEN, ['https://www.googleapis.com/auth/firebase', 'https://www.googleapis.com/auth/cloud-platform'])
                  .then(t => console.log(t.access_token))
                  .catch(e => { console.error(e.message); process.exit(1); });
              "`,
              { encoding: 'utf8', env: { ...process.env } }
            ).trim();

            console.log('Access token obtido');

            const getRes = await httpRequest({
              hostname: 'identitytoolkit.googleapis.com',
              path: `/v2/projects/${PROJECT_ID}/config`,
              method: 'GET',
              headers: { 'Authorization': `Bearer ${getToken}`, 'Content-Type': 'application/json' }
            });

            if (getRes.status !== 200) throw new Error(`GET config falhou: ${JSON.stringify(getRes.body)}`);

            const existing = getRes.body.authorizedDomains || [];
            const merged = [...new Set([...existing, ...DOMAINS])];
            const added = DOMAINS.filter(d => !existing.includes(d));

            if (added.length === 0) {
              console.log('✅ Domínios já configurados:', existing.join(', '));
              return;
            }

            const patchRes = await httpRequest({
              hostname: 'identitytoolkit.googleapis.com',
              path: `/v2/projects/${PROJECT_ID}/config?updateMask=authorizedDomains`,
              method: 'PATCH',
              headers: { 'Authorization': `Bearer ${getToken}`, 'Content-Type': 'application/json' }
            }, { authorizedDomains: merged });

            if (patchRes.status !== 200) throw new Error(`PATCH falhou: ${JSON.stringify(patchRes.body)}`);
            console.log('✅ Domínios adicionados:', added.join(', '));
            console.log('✅ Todos os domínios:', merged.join(', '));
          }

          run().catch(e => { console.error('❌', e.message); process.exit(1); });
          EOF

      - name: Verificar resultado
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          echo "✅ Configuração concluída!"
          firebase --token "$FIREBASE_TOKEN" auth:export /dev/null --project sentinela-ai-489015 2>&1 | head -5 || true
