name: Map and Fix Server
'on':
  workflow_dispatch: null
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: npm ci && npm run build && cp htaccess.txt dist/.htaccess && cp 404-spa.html
        dist/404.html
    - name: Listar raiz FTP completa
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'echo "=== CONTEUDO COMPLETO DA RAIZ FTP ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/" | awk ''{print $1,
        $5, $NF}''

        echo ""

        echo "=== SIZE index.html atual ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/index.html" | wc -c

        echo "=== CONTEUDO index.html atual ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "ftp://$FTP_HOST/index.html"

        '
    - name: DELETAR todos os arquivos antigos
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'H="ftp://$FTP_HOST"

        del() { curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "DELE $1" 2>&1 && echo
        "DEL: $1" || echo "skip: $1"; }

        # Deletar TUDO que pode estar conflitando

        del "index.html"

        del ".htaccess"

        del "404.html"

        del "index.php"

        del "studiologos-probe.txt"

        del ".ftp-deploy-sync-state.json"

        del "deploy_test.txt"

        del "assets/index-DYJn2QEj.js"

        del "assets/index-DjS088-i.css"

        del "assets/index-UIeH9Ysg.js"

        del "assets/index-mCBVk_n0.css"

        # Remover pasta assets vazia e recriar

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "RMD assets" 2>&1 || true

        sleep 2

        echo "=== Raiz apos delete ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" | awk ''{print $5, $NF}''

        '
    - name: Upload clean dos arquivos corretos
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'H="ftp://$FTP_HOST"

        up() { curl -s -T "$1" --user "$FTP_USER:$FTP_PASS" --ftp-create-dirs "$2"
        && echo "UP OK: $2 ($(wc -c < $1)b)" || echo "UP FAIL: $2"; }

        up dist/index.html                    "$H/index.html"

        up dist/.htaccess                     "$H/.htaccess"

        up dist/404.html                      "$H/404.html"

        up dist/assets/index-DYJn2QEj.js      "$H/assets/index-DYJn2QEj.js"

        up dist/assets/index-DjS088-i.css     "$H/assets/index-DjS088-i.css"

        echo ""

        echo "=== Raiz apos upload ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" | awk ''{print $1, $5, $NF}''

        echo ""

        echo "=== index.html no servidor ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/index.html"

        '
    - name: Validar site em producao
      run: "sleep 20\nC=$(curl -s --max-time 20 https://studiologos.com.br/)\necho\
        \ \"HTTP size: $(echo \"$C\" | wc -c)\"\necho \"$C\" | grep -o \"<title>[^<]*</title>\"\
        \necho \"$C\" | grep \"src=\\|href=\" | head -5\nif echo \"$C\" | grep -q\
        \ \"assets/index-\"; then\n  echo \"✅ SUCESSO: BUILD COMPILADA ATIVA\"\nelse\n\
        \  echo \"❌ AINDA COM ARQUIVO ERRADO\"\n  exit 1\nfi\n"
    - name: Snapshot branch deploy
      run: 'git config user.email "actions@github.com"

        git config user.name "GitHub Actions CI"

        cp -r dist /tmp/snap

        git checkout --orphan deploy-ci

        git rm -rf . 2>/dev/null || true

        cp -r /tmp/snap/. .

        git add -A

        git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ${GITHUB_SHA:0:7}" ||
        true

        git push --force origin deploy-ci:deploy || true

        '
      continue-on-error: true
