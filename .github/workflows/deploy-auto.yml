name: 🚀 Auto-Deploy Studio Logos → Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build → Clean Upload → Validate
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔨 Build de produção
        run: npm run build

      - name: 📄 .htaccess — SPA routing + cache + gzip
        run: |
          cat > dist/.htaccess << 'EOF'
Options -MultiViews
RewriteEngine On
RewriteBase /
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^ index.html [QSA,L]
<IfModule mod_expires.c>
  ExpiresActive On
  ExpiresByType text/html "access plus 0 seconds"
  ExpiresByType text/css "access plus 1 year"
  ExpiresByType application/javascript "access plus 1 year"
  ExpiresByType image/svg+xml "access plus 1 year"
  ExpiresByType font/woff2 "access plus 1 year"
</IfModule>
<IfModule mod_deflate.c>
  AddOutputFilterByType DEFLATE text/html text/css application/javascript
</IfModule>
EOF

      - name: 📄 404.html — SPA redirect
        run: |
          cat > dist/404.html << 'EOF'
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=/"><title>Studio Logos</title>
</head><body><script>window.location.href='/';</script></body></html>
EOF

      - name: 📋 Confirmar build
        run: |
          echo "=== dist/ ===" && find dist -type f | sort
          echo ""
          echo "=== index.html ===" && cat dist/index.html

      - name: 🚀 FTP Upload → /public_html (CLEAN SLATE)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: true
          log-level: standard

      - name: 🔄 Snapshot → branch deploy
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions CI"
          cp -r dist /tmp/snap
          git checkout --orphan deploy-ci
          git rm -rf . 2>/dev/null || true
          cp -r /tmp/snap/. .
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%dT%H:%M:%SZ') ${GITHUB_SHA:0:7}" || true
          git push --force origin deploy-ci:deploy
          echo "✅ Branch deploy atualizado"
        continue-on-error: true

      - name: 🌐 Validar produção
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://studiologos.com.br/)
          TITLE=$(curl -s --max-time 20 https://studiologos.com.br/ | grep -o '<title>[^<]*</title>' | head -1)
          echo "HTTP: $STATUS"
          echo "Title: $TITLE"
          if echo "$TITLE" | grep -q "Studio Logos"; then
            echo "✅ BUILD CORRETA NO AR"
          else
            echo "⚠️ Title não corresponde — verificar"
            exit 1
          fi
          echo "🌐 https://studiologos.com.br"
