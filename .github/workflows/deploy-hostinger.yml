name: Deploy Studio Logos → Hostinger (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔨 Compilar projeto (build de produção)
        run: npm run build

      - name: 📄 Criar .htaccess para SPA routing
        run: |
          cat > dist/.htaccess << 'EOF'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [QSA,L]
          
          # Cache para assets estáticos
          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/jpg "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/gif "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 year"
            ExpiresByType image/x-icon "access plus 1 year"
            ExpiresByType font/woff2 "access plus 1 year"
          </IfModule>
          
          # Compressão Gzip
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/plain
            AddOutputFilterByType DEFLATE text/html
            AddOutputFilterByType DEFLATE text/xml
            AddOutputFilterByType DEFLATE text/css
            AddOutputFilterByType DEFLATE application/xml
            AddOutputFilterByType DEFLATE application/xhtml+xml
            AddOutputFilterByType DEFLATE application/rss+xml
            AddOutputFilterByType DEFLATE application/javascript
            AddOutputFilterByType DEFLATE application/x-javascript
          </IfModule>
          EOF

      - name: 📄 Criar página 404.html
        run: |
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/">
            <title>Studio Logos - Redirecionando...</title>
          </head>
          <body>
            <script>
              window.location.href = window.location.origin + '/#' + window.location.pathname;
            </script>
          </body>
          </html>
          EOF

      - name: 📋 Listar arquivos da build
        run: |
          echo "=== Arquivos na build ==="
          find dist -type f | sort
          echo "=== Tamanho total ==="
          du -sh dist/

      - name: 🚀 Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: true
          log-level: standard
          timeout: 60000

      - name: ✅ Deploy concluído
        run: |
          echo "🎉 Studio Logos deployado com sucesso!"
          echo "🌐 Acesse: https://studiologos.com.br"
