    <title>Studio Logos Educação | Português, Literatura e Escrita</title>
    <script>
      // Chromium extension noise: does not come from the Studio Logos app.
      (function silenceBrowserExtensionNoise() {
        var noisyMessage = "A listener indicated an asynchronous response by returning true";
        window.addEventListener("unhandledrejection", function (event) {
          var message = String((event.reason && (event.reason.message || event.reason)) || "");
          if (message.indexOf(noisyMessage) !== -1) event.preventDefault();
        });
        window.addEventListener("error", function (event) {
          var message = String(event.message || "");
          if (message.indexOf(noisyMessage) !== -1) event.preventDefault();
        });
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <!-- Manifest/PWA disabled during development to prevent stale app cache. -->

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="StudioLogos" />
  </head>
