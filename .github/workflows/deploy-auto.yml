name: 🚀 Auto-Deploy Studio Logos → Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Forçar rebuild completo'
        required: false
        default: 'false'
        type: boolean

env:
  SSH_HOST: 89.116.115.179
  SSH_PORT: 65002
  SSH_USER: u876483543
  REMOTE_DIR: /home/u876483543/domains/studiologos.com.br/public_html

jobs:
  build-and-deploy:
    name: Build → Deploy → Validate
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout branch main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🟢 Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔨 Build de produção
        run: npm run build

      - name: 📄 Gerar .htaccess (SPA + cache + gzip)
        run: |
          cat > dist/.htaccess << 'HTEOF'
          Options -MultiViews
          RewriteEngine On
          RewriteBase /
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [QSA,L]
          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/html "access plus 0 seconds"
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 year"
            ExpiresByType font/woff2 "access plus 1 year"
          </IfModule>
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/plain text/css application/javascript application/json
          </IfModule>
          HTEOF

      - name: 📄 Gerar 404.html (SPA redirect)
        run: |
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/">
            <title>Studio Logos</title>
          </head>
          <body>
            <script>window.location.href = '/';</script>
          </body>
          </html>
          EOF

      - name: 🔄 Atualizar branch deploy com build atual
        run: |
          git config user.email "deploy@studiologos.com.br"
          git config user.name "Studio Logos CI"
          git fetch origin deploy 2>/dev/null || true
          
          # Criar branch deploy órfão com os arquivos compilados
          git checkout --orphan deploy-ci
          git rm -rf . --quiet 2>/dev/null || true
          
          # Copiar arquivos da build
          cp -r dist/. .
          
          # Commit
          git add -A
          git diff --cached --quiet || git commit -m "deploy: auto-build $(date -u '+%Y-%m-%dT%H:%M:%SZ') — ${{ github.sha }}"
          git push --force origin deploy-ci:deploy
          echo "✅ Branch deploy atualizado"

      - name: 🔧 Instalar sshpass e rsync
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass rsync

      - name: 🚀 Deploy SFTP → Hostinger (porta 65002)
        env:
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/config << 'SSHEOF'
          Host hostinger
            HostName 89.116.115.179
            Port 65002
            User u876483543
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          SSHEOF
          chmod 600 ~/.ssh/config

          # Verificar conectividade
          sshpass -p "$SSH_PASS" ssh -p $SSH_PORT \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            $SSH_USER@$SSH_HOST "echo '✅ SSH OK'" || {
              echo "⚠️ SSH falhou, tentando FTP fallback..."
              exit 1
            }

          # Upload via rsync
          sshpass -p "$SSH_PASS" rsync -avz --delete \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            dist/ \
            $SSH_USER@$SSH_HOST:$REMOTE_DIR/

          echo "✅ Upload rsync concluído!"

      - name: 🔍 Validar deploy no servidor
        env:
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          echo "=== Arquivos no servidor ==="
          sshpass -p "$SSH_PASS" ssh -p $SSH_PORT \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            $SSH_USER@$SSH_HOST \
            "ls -lh $REMOTE_DIR/ && echo '---' && ls -lh $REMOTE_DIR/assets/ 2>/dev/null || true"

      - name: 🌐 Validar HTTP do site
        run: |
          echo "Aguardando propagação (15s)..."
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://studiologos.com.br/ 2>/dev/null || echo "000")
          echo "HTTP Status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "301" || "$HTTP_STATUS" == "302" ]]; then
            echo "✅ Site respondendo: $HTTP_STATUS"
          else
            echo "⚠️ Site retornou: $HTTP_STATUS (pode ser DNS/SSL ainda propagando)"
          fi
          echo "🌐 https://studiologos.com.br"

  ftp-fallback:
    name: 📁 FTP Fallback (se SSH falhar)
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: failure()

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install + Build
        run: npm ci && npm run build

      - name: 📁 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /domains/studiologos.com.br/public_html/
          log-level: standard
