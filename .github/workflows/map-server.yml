name: Map and Fix Server
'on':
  workflow_dispatch: null
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: npm ci && npm run build && cp 404-spa.html dist/404.html
    - name: 'TESTE: apagar htaccess e verificar assets direto'
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'H="ftp://$FTP_HOST"

        del() { curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "DELE $1" 2>&1 | head
        -1; echo "DEL $1"; }

        up()  { echo -n "UP $2: "; curl -s -T "$1" --user "$FTP_USER:$FTP_PASS" --ftp-create-dirs
        "$2" && echo "OK $(wc -c<$1)b" || echo "FAIL"; }


        # Remover .htaccess para testar se assets funcionam sem ele

        del ".htaccess"


        # Reupar assets (garantia)

        del "assets/index-DYJn2QEj.js"

        del "assets/index-DjS088-i.css"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "RMD assets" 2>&1 | head -1

        sleep 1

        up dist/assets/index-DjS088-i.css "$H/assets/index-DjS088-i.css"

        up dist/assets/index-DYJn2QEj.js  "$H/assets/index-DYJn2QEj.js"


        echo ""

        echo "=== SERVIDOR (sem htaccess) ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" | awk ''{print $1,$5,$NF}''

        echo "--- assets/ ---"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/assets/" | awk ''{print $1,$5,$NF}''

        '
    - name: Testar assets SEM htaccess
      run: "sleep 15\nJS=$(curl -s -o /dev/null -w \"%{http_code} %{size_download}b\"\
        \ --max-time 30 https://studiologos.com.br/assets/index-DYJn2QEj.js)\nCSS=$(curl\
        \ -s -o /dev/null -w \"%{http_code} %{size_download}b\" --max-time 20 https://studiologos.com.br/assets/index-DjS088-i.css)\n\
        echo \"JS sem htaccess:  $JS\"\necho \"CSS sem htaccess: $CSS\"\nif echo \"\
        $JS\" | grep -q \"^200\"; then\n  echo \"CONFIRMADO: problema era o .htaccess\"\
        \nelse\n  echo \"AINDA 404 sem htaccess = problema de outra origem\"\nfi\n"
    - name: Subir htaccess correto para LiteSpeed
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'H="ftp://$FTP_HOST"

        up() { echo -n "UP $2: "; curl -s -T "$1" --user "$FTP_USER:$FTP_PASS" --ftp-create-dirs
        "$2" && echo "OK $(wc -c<$1)b" || echo "FAIL"; }


        # Criar htaccess SPA correto para LiteSpeed

        # Usando RewriteCond com caminho absoluto que o LiteSpeed entende

        cat > /tmp/htaccess_final << "HTEOF"

        Options -MultiViews

        <IfModule mod_rewrite.c>

        RewriteEngine On

        RewriteRule ^assets/ - [L]

        RewriteCond %{REQUEST_FILENAME} !-f

        RewriteCond %{REQUEST_FILENAME} !-d

        RewriteRule ^ /index.html [L]

        </IfModule>

        HTEOF

        echo "htaccess que sera subido:"

        cat /tmp/htaccess_final

        up /tmp/htaccess_final "$H/.htaccess"

        '
    - name: Validar site FINAL
      run: "sleep 15\necho \"=== HTTP FINAL ===\"\ncurl -s -o /dev/null -w \"/   \
        \           %{http_code} %{size_download}b\\n\" --max-time 20 https://studiologos.com.br/\n\
        curl -s -o /dev/null -w \"JS bundle:     %{http_code} %{size_download}b\\\
        n\" --max-time 30 https://studiologos.com.br/assets/index-DYJn2QEj.js\ncurl\
        \ -s -o /dev/null -w \"CSS bundle:    %{http_code} %{size_download}b\\n\"\
        \ --max-time 20 https://studiologos.com.br/assets/index-DjS088-i.css\ncurl\
        \ -s -o /dev/null -w \"/biblioteca:   %{http_code}\\n\"                  \
        \ --max-time 10 https://studiologos.com.br/biblioteca\n\nJS=$(curl -s -o /dev/null\
        \ -w \"%{http_code}\" --max-time 30 https://studiologos.com.br/assets/index-DYJn2QEj.js)\n\
        CSS=$(curl -s -o /dev/null -w \"%{http_code}\" --max-time 20 https://studiologos.com.br/assets/index-DjS088-i.css)\n\
        IDX=$(curl -s --max-time 20 https://studiologos.com.br/ | grep -c \"assets/index-\"\
        )\n\nif [ \"$JS\" = \"200\" ] && [ \"$CSS\" = \"200\" ] && [ \"$IDX\" -gt\
        \ \"0\" ]; then\n  echo \"\"\n  echo \"✅ SITE 100% NO AR\"\n  echo \"   index.html\
        \ : OK\"\n  echo \"   JS bundle  : OK 1.3MB\"\n  echo \"   CSS bundle : OK\
        \ 78KB\"\n  echo \"   SPA routing: OK\"\n  echo \"\U0001F310 https://studiologos.com.br\"\
        \nelse\n  echo \"❌ JS=$JS CSS=$CSS IDX=$IDX\"\n  exit 1\nfi\n"
    - name: Atualizar branch deploy
      run: 'git config user.email "actions@github.com"

        git config user.name "GitHub Actions CI"

        cp -r dist /tmp/snap

        git checkout --orphan deploy-ci

        git rm -rf . 2>/dev/null || true

        cp -r /tmp/snap/. .

        git add -A

        git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ${GITHUB_SHA:0:7}" ||
        true

        git push --force origin deploy-ci:deploy || true

        echo "OK"

        '
      continue-on-error: true
