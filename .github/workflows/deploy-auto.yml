name: "Auto-Deploy Studio Logos"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: "Build e Deploy"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Instalar dependencias"
        run: npm ci

      - name: "Build producao"
        run: npm run build

      - name: "Copiar htaccess e 404 para dist"
        run: |
          cp htaccess.txt dist/.htaccess
          cp 404-spa.html dist/404.html
          echo "Arquivos em dist:"
          find dist -type f | sort
          echo "---index.html---"
          cat dist/index.html

      - name: "FTP Deploy com clean slate"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /domains/studiologos.com.br/public_html/
          dangerous-clean-slate: true
          log-level: standard

      - name: "Validar site em producao"
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://studiologos.com.br/ || echo 0)
          CONTENT=$(curl -s --max-time 20 https://studiologos.com.br/ || echo "")
          echo "HTTP Status: $STATUS"
          echo "$CONTENT" | grep -o "<title>[^<]*</title>"
          if echo "$CONTENT" | grep -q "assets/index-"; then
            echo "OK: BUILD COMPILADA ATIVA NO SERVIDOR"
          else
            echo "FALHA: servidor com arquivo incorreto"
            echo "$CONTENT" | head -15
            exit 1
          fi

      - name: "Snapshot no branch deploy"
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions CI"
          cp -r dist /tmp/snap
          git checkout --orphan deploy-ci
          git rm -rf . 2>/dev/null || true
          cp -r /tmp/snap/. .
          git add -A
          git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ${GITHUB_SHA:0:7}" || true
          git push --force origin deploy-ci:deploy || true
        continue-on-error: true
