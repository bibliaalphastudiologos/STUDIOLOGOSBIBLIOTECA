name: Map and Fix Server
'on':
  workflow_dispatch: null
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: npm ci && npm run build && cp htaccess.txt dist/.htaccess && cp 404-spa.html
        dist/404.html
    - name: Purge LiteSpeed cache + re-upload assets
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'H="ftp://$FTP_HOST"

        up() { curl -s -T "$1" --user "$FTP_USER:$FTP_PASS" --ftp-create-dirs "$2"
        && echo "OK $2 $(wc -c<$1)b" || echo "FAIL $2"; }


        # Reupload assets com novo nome de arquivo para forçar miss de cache

        # Mas primeiro: tentar purge via HTTP

        echo "=== Purge LiteSpeed via HTTP ==="

        curl -s -X PURGE -H "X-LiteSpeed-Purge: *" --max-time 10 https://studiologos.com.br/
        || true

        curl -s -X PURGE --max-time 10 "https://studiologos.com.br/assets/index-DYJn2QEj.js"
        || true

        curl -s -X PURGE --max-time 10 "https://studiologos.com.br/assets/index-DjS088-i.css"
        || true


        # Forcar miss: deletar e reupar com timestamp diferente

        echo "=== Deletar e reupar assets ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "DELE assets/index-DYJn2QEj.js"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "DELE assets/index-DjS088-i.css"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "DELE assets/index-UIeH9Ysg.js"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "DELE assets/index-mCBVk_n0.css"

        sleep 3

        up dist/assets/index-DjS088-i.css "$H/assets/index-DjS088-i.css"

        up dist/assets/index-DYJn2QEj.js  "$H/assets/index-DYJn2QEj.js"


        # Criar .htaccess com header de purge para o LiteSpeed

        printf "Options -MultiViews\n<IfModule mod_rewrite.c>\nRewriteEngine On\nRewriteCond
        %%{REQUEST_FILENAME} !-f\nRewriteCond %%{REQUEST_FILENAME} !-d\nRewriteRule
        .* /index.html [L]\n</IfModule>\n<IfModule mod_headers.c>\nHeader set X-LiteSpeed-Cache-Control
        \"no-cache\"\n</IfModule>\n" > /tmp/ht.txt

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "DELE .htaccess"

        sleep 1

        curl -s -T /tmp/ht.txt --user "$FTP_USER:$FTP_PASS" "$H/.htaccess" && echo
        "htaccess OK"


        echo ""

        echo "=== Estado servidor ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" | awk ''{print $1,$5,$NF}''

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/assets/" | awk ''{print $5,$NF}''

        '
    - name: Aguardar e validar
      run: "sleep 30\necho \"=== Tentativa 1 (30s) ===\"\nJS=$(curl -s -o /dev/null\
        \ -w \"%{http_code} %{size_download}b\" --max-time 30 https://studiologos.com.br/assets/index-DYJn2QEj.js)\n\
        echo \"JS: $JS\"\n\necho \"=== Tentativa 2 (60s) ===\"\nsleep 30\nJS2=$(curl\
        \ -s -o /dev/null -w \"%{http_code} %{size_download}b\" --max-time 30 https://studiologos.com.br/assets/index-DYJn2QEj.js)\n\
        CSS2=$(curl -s -o /dev/null -w \"%{http_code} %{size_download}b\" --max-time\
        \ 20 https://studiologos.com.br/assets/index-DjS088-i.css)\nIDX=$(curl -s\
        \ -o /dev/null -w \"%{http_code} %{size_download}b\" --max-time 20 https://studiologos.com.br/)\n\
        SPA=$(curl -s -o /dev/null -w \"%{http_code}\" --max-time 10 https://studiologos.com.br/biblioteca)\n\
        echo \"/           $IDX\"\necho \"JS:         $JS2\"\necho \"CSS:        $CSS2\"\
        \necho \"/biblioteca $SPA\"\n\nJS_CODE=$(echo \"$JS2\" | cut -d\" \" -f1)\n\
        CSS_CODE=$(echo \"$CSS2\" | cut -d\" \" -f1)\nif [ \"$JS_CODE\" = \"200\"\
        \ ] && [ \"$CSS_CODE\" = \"200\" ]; then\n  echo \"\"\n  echo \"✅ DEPLOY 100%\
        \ VALIDADO\"\n  echo \"\U0001F310 https://studiologos.com.br\"\nelse\n  echo\
        \ \"\"\n  echo \"JS=$JS_CODE CSS=$CSS_CODE\"\n  echo \"ETag do asset (se ainda\
        \ for o cache antigo = 119f):\"\n  curl -sI --max-time 10 https://studiologos.com.br/assets/index-DYJn2QEj.js\
        \ | grep -i \"etag\\|last-modified\\|content-length\"\n  exit 1\nfi\n"
    - name: Branch deploy
      run: 'git config user.email "actions@github.com"

        git config user.name "GitHub Actions CI"

        cp -r dist /tmp/snap

        git checkout --orphan deploy-ci

        git rm -rf . 2>/dev/null || true

        cp -r /tmp/snap/. .

        git add -A

        git commit -m "deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) ${GITHUB_SHA:0:7}" ||
        true

        git push --force origin deploy-ci:deploy || true

        '
      continue-on-error: true
