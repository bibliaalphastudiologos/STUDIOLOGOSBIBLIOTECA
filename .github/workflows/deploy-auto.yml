name: Auto-Deploy Studio Logos
'on':
  push:
    branches:
    - main
  workflow_dispatch: null
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
    - name: Build
      run: 'npm ci && npm run build

        cp htaccess.txt dist/.htaccess

        cp 404-spa.html dist/404.html

        echo "=== .htaccess ===" && cat dist/.htaccess

        echo "=== index.html ===" && cat dist/index.html

        echo "=== assets ===" && ls -lh dist/assets/

        '
    - name: Deploy limpo no Hostinger
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: 'H="ftp://$FTP_HOST"

        del() { curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "DELE $1" 2>&1 | head
        -1; }

        up()  { echo -n "  $2: "; curl -s -T "$1" --user "$FTP_USER:$FTP_PASS" --ftp-create-dirs
        "$2" && echo "OK $(wc -c<$1)b" || echo "FAIL"; }


        echo "=== Deletar TUDO (assets + raiz) ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/assets/" | awk ''{print $NF}'' |
        grep "\." | while read f; do del "assets/$f"; done

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" -Q "RMD assets" 2>&1 | head -1

        for f in index.html .htaccess 404.html index.php .ftp-deploy-sync-state.json;
        do del "$f"; done

        sleep 3


        echo "Subindo build completo gerado pelo Vite"


        up dist/.htaccess  "$H/.htaccess"

        up dist/index.html "$H/index.html"

        up dist/404.html   "$H/404.html"

        find dist/assets -type f | while read file; do
          up "$file" "$H/${file#dist/}"
        done

        if [ -d dist/api ]; then
          find dist/api -type f | while read file; do
            up "$file" "$H/${file#dist/}"
          done
        fi


        echo ""

        echo "=== Estado servidor ==="

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/" | awk ''{print $5,$NF}''

        echo "assets/:"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/assets/" | awk ''{print $5,$NF}''

        echo ".htaccess:"

        curl -s --user "$FTP_USER:$FTP_PASS" "$H/.htaccess"

        '
    - name: Validar site
      run: "sleep 30\nJS=$(ls dist/assets/*.js | head -1 | xargs basename)\nCSS=$(ls\
        \ dist/assets/*.css | head -1 | xargs basename)\n\necho \"=== HTTP ===\"\n\
        curl -s -o /dev/null -w \"/              %{http_code} %{size_download}b\\\
        n\" --max-time 20 https://studiologos.com.br/\ncurl -s -o /dev/null -w \"\
        JS:            %{http_code} %{size_download}b\\n\" --max-time 30 \"https://studiologos.com.br/assets/$JS\"\
        \ncurl -s -o /dev/null -w \"CSS:           %{http_code} %{size_download}b\\\
        n\" --max-time 20 \"https://studiologos.com.br/assets/$CSS\"\ncurl -s -o /dev/null\
        \ -w \"/biblioteca:   %{http_code}\\n\"                   --max-time 10 https://studiologos.com.br/biblioteca\n\
        \necho \"\"\necho \"Content-Type do JS:\"\ncurl -sI --max-time 15 \"https://studiologos.com.br/assets/$JS\"\
        \ | grep -i \"content-type\\|content-length\\|etag\"\n\nJS_SZ=$(curl -s -o\
        \ /dev/null -w \"%{size_download}\" --max-time 30 \"https://studiologos.com.br/assets/$JS\"\
        )\nCSS_SZ=$(curl -s -o /dev/null -w \"%{size_download}\" --max-time 20 \"\
        https://studiologos.com.br/assets/$CSS\")\n\nif [ \"$JS_SZ\" -gt \"100000\"\
        \ ] && [ \"$CSS_SZ\" -gt \"10000\" ]; then\n  echo \"\"\n  echo \"✅ SITE 100%\
        \ NO AR\"\n  echo \"   JS: ${JS_SZ} bytes OK\"\n  echo \"   CSS: ${CSS_SZ}\
        \ bytes OK\"\n  echo \"\U0001F310 https://studiologos.com.br\"\nelse\n  echo\
        \ \"❌ JS=${JS_SZ}b CSS=${CSS_SZ}b\"\n  exit 1\nfi\n"
