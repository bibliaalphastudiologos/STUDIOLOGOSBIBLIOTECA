name: Build and Commit Dist

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: |
          npm run build
          cp .htaccess dist/.htaccess
          cp 404-spa.html dist/404.html

      - name: Commit dist to deploy branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f dist/
          git commit -m "chore: deploy build [skip ci]" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:deploy --force
